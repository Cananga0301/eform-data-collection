services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: eform_data
      POSTGRES_USER: eform_user
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  eform:
    build: .
    ports:
      - "38001:8000"
    depends_on:
      - postgres
    environment:
      FLASK_ENV: dev
      FLASK_DEBUG: "false"
      FLASK_SECRET_KEY: change_me_in_prod

volumes:
  postgres_data:
